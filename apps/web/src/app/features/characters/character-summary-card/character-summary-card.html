<button type="button" class="character-summary-card" (click)="onClick()">
  <app-character-avatar
    [name]="name()"
    [size]="44"
    [characterId]="character().id"
    [portraitUrl]="character().portraitUrl"
    [cropData]="$any(character().portraitCropData)"
  />
  <div class="character-summary-card__info">
    <span class="character-summary-card__name">{{ name() }}</span>
    @if (className()) {
      <span class="character-summary-card__class">{{ className() }}</span>
    }
    @if (showOwnerInfo()) {
      @if (character().ownerIsMj) {
        <span class="character-summary-card__owner-badge">{{ theme.tone()['character.owner_badge_mj'] }}</span>
      } @else {
        <span class="character-summary-card__owner-badge">{{ character().ownerPseudo }}</span>
      }
    }
    @if (hasPendingLevelUp()) {
      <span class="character-summary-card__levelup-badge">
        {{ theme.tone()['roster.levelup_badge'] }}
      </span>
    }
  </div>
  <div class="character-summary-card__badges">
    <span class="stat-pill">PV {{ character().derived.PV }}</span>
    <span class="stat-pill">PE {{ character().derived.PE }}</span>
    <span class="stat-pill">Initiative {{ character().derived.Initiative }}</span>
    <span class="stat-pill">Encombrement max {{ character().derived.Encombrement }}</span>
  </div>
</button>
