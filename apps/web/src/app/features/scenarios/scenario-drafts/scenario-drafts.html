<div class="scenario-drafts">
  <div class="header">
    <h2>Brouillons</h2>
    <button mat-flat-button type="button" (click)="newScenario()">+ Nouveau scénario</button>
  </div>

  @if (loadError()) {
    <p class="error">{{ loadError() }}</p>
  } @else if (drafts().length === 0) {
    <p class="empty">Aucun brouillon pour l'instant.</p>
  } @else {
    <ul>
      @for (draft of drafts(); track draft.id) {
        <li class="draft-row" (click)="openScenario(draft)">
          <span>{{ draft.title }}</span>
          <button mat-button type="button" (click)="openToPlayers(draft, $event)">
            Ouvrir aux joueurs
          </button>
        </li>
      }
    </ul>
  }
</div>
