<div class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header><mat-card-title>Nouveau mot de passe</mat-card-title></mat-card-header>
    <mat-card-content>
      @if (!token()) {
        <p class="error">
          Lien invalide. <a routerLink="/forgot-password">Refaire une demande</a>.
        </p>
      }
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Nouveau mot de passe (8+ caractères)</mat-label>
          <input matInput type="password" formControlName="newPassword" autocomplete="new-password" />
        </mat-form-field>
        @if (error()) {
          <p class="error">
            {{ error() }} <a routerLink="/forgot-password">Refaire une demande</a>.
          </p>
        }
        <button mat-flat-button type="submit" [disabled]="loading() || !token()">Réinitialiser</button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <a routerLink="/login">Retour à la connexion</a>
    </mat-card-actions>
  </mat-card>
</div>
