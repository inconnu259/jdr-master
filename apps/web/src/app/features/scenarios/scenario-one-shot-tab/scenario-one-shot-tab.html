@if (loadError()) {
  <p class="error">{{ loadError() }}</p>
} @else if (notFound()) {
  <p class="empty">
    Ce scénario n'est plus en brouillon — sa gestion complète sera disponible via la timeline
    (Story 7.5).
  </p>
} @else if (scenario(); as s) {
  @if (s.status === 'BROUILLON') {
    <div class="open-bar">
      <button mat-flat-button type="button" [disabled]="opening()" (click)="openToPlayers()">
        Ouvrir aux joueurs
      </button>
      @if (openError()) {
        <p class="error">{{ openError() }}</p>
      }
    </div>
  }
  <app-scenario-editor [scenario]="s" />
}
