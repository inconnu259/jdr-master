# Image de dev commune (Node 24 + OpenSSL + pnpm) — construite une fois, partagée.
x-dev: &dev
  image: master-jdr-dev:local
  build:
    context: .
    dockerfile: docker/dev.Dockerfile

services:
  # Relais SMTP factice pour dev/test (FR-1) : capture les e-mails sans les envoyer réellement,
  # consultables via son API HTTP. Remplaçant maintenu de MailHog (mêmes ports, API compatible).
  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - '8025:8025' # UI web + API HTTP
      - '1025:1025' # SMTP

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: [.env]
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 12

  # Installe les dépendances du workspace une seule fois dans les volumes node_modules,
  # puis se termine. api et web attendent sa réussite.
  deps:
    <<: *dev
    working_dir: /work
    volumes:
      - .:/work
      - node_modules_root:/work/node_modules
      - node_modules_api:/work/apps/api/node_modules
      - node_modules_web:/work/apps/web/node_modules
    command: pnpm install

  api:
    <<: *dev
    working_dir: /work/apps/api
    env_file: [.env]
    environment:
      PORT: '3000'
      CHOKIDAR_USEPOLLING: 'true'
    depends_on:
      db:
        condition: service_healthy
      deps:
        condition: service_completed_successfully
    volumes:
      - .:/work
      - node_modules_root:/work/node_modules
      - node_modules_api:/work/apps/api/node_modules
    ports:
      - '${API_PORT}:3000'
    command: sh -c "pnpm prisma generate && pnpm prisma migrate deploy && pnpm run seed && pnpm start:dev"

  web:
    <<: *dev
    working_dir: /work/apps/web
    environment:
      CHOKIDAR_USEPOLLING: 'true'
    depends_on:
      deps:
        condition: service_completed_successfully
    volumes:
      - .:/work
      - node_modules_root:/work/node_modules
      - node_modules_web:/work/apps/web/node_modules
    ports:
      - '${WEB_PORT}:4200'
    command: sh -c "pnpm ng serve --host 0.0.0.0 --port 4200 --poll 500"

volumes:
  db-data:
  node_modules_root:
  node_modules_api:
  node_modules_web:
