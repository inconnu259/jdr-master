<article class="agg-card" [class]="priorityClass()">
  <header class="agg-card__header">
    <span class="agg-card__date">{{ formatDate(slot().date) }}</span>
    <span class="agg-card__slot">{{ slotLabel() }}</span>
  </header>
  <div class="agg-card__counts" aria-label="Disponibilités">
    <span title="Disponibles">✅ {{ slot().available }}</span>
    <span title="Inconnus">⚠️ {{ slot().unknown }}</span>
    @if (slot().unavailable > 0) {
      <span title="Indisponibles">❌ {{ slot().unavailable }}</span>
    }
    <span class="agg-card__total">/ {{ slot().total }}</span>
  </div>
</article>
