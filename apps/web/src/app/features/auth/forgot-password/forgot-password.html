<div class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header><mat-card-title>Mot de passe oublié</mat-card-title></mat-card-header>
    <mat-card-content>
      @if (sent()) {
        <p>Si un compte existe pour cette adresse, un e-mail de réinitialisation a été envoyé.</p>
      } @else {
        <form [formGroup]="form" (ngSubmit)="submit()">
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" autocomplete="email" />
          </mat-form-field>
          @if (error()) {
            <p class="error">{{ error() }}</p>
          }
          <button mat-flat-button type="submit" [disabled]="loading()">Envoyer le lien</button>
        </form>
      }
    </mat-card-content>
    <mat-card-actions>
      <a routerLink="/login">Retour à la connexion</a>
    </mat-card-actions>
  </mat-card>
</div>
