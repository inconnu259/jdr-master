<div class="calendar-page" [class.calendar-page--mj]="isMjMode()">
  <div class="calendar-main">
    @if (error()) {
      <p class="calendar-error" role="alert">{{ error() }}</p>
    }
    <div class="view-toggle">
      <mat-button-toggle-group [value]="view()" (change)="onViewChange($event.value)" aria-label="Vue du calendrier">
        <mat-button-toggle value="month">Vue mois</mat-button-toggle>
        <mat-button-toggle value="week">Vue semaine</mat-button-toggle>
      </mat-button-toggle-group>
    </div>

    @if (view() === 'month') {
      <app-calendar-month-view
        [declarations]="declarations()"
        [loading]="loading()"
        [pendingDto]="pendingDto()"
        [initialDate]="sharedDate()"
        [heatmap]="heatmap()"
        (slotSelected)="onSlotSelected($event)"
        (displayDateChange)="onMonthDateChange($event)"
      />
    } @else {
      <app-calendar-week-view
        [declarations]="declarations()"
        [loading]="loading()"
        [pendingDto]="pendingDto()"
        [startDate]="sharedDate()"
        (slotSelected)="onSlotSelected($event)"
        (displayDateChange)="onWeekDateChange($event)"
      />
    }

    @if (isMjMode()) {
      <button class="see-slots-btn" mat-stroked-button (click)="scrollToSlots()">
        Voir les créneaux calculés
      </button>
    }
  </div>

  @if (isMjMode()) {
    <div class="mj-results-panel" #slotsPanel>
      <div class="date-range-form">
        <label class="date-range-label">
          Du
          <input
            type="date"
            class="date-input"
            [value]="fromDateStr()"
            (change)="onFromChange($event)"
          />
        </label>
        <label class="date-range-label">
          Au
          <input
            type="date"
            class="date-input"
            [value]="toDateStr()"
            (change)="onToChange($event)"
          />
        </label>
        <button mat-stroked-button (click)="onSearch()">Rechercher</button>
      </div>
      <app-available-slots
        [slots]="availableSlots()"
        [loading]="slotsLoading()"
        [error]="slotsError()"
      />
    </div>
  }
</div>

@if (panelOpen()) {
  <div class="constraint-backdrop" (click)="closePanel()" aria-hidden="true"></div>
  <app-constraint-panel
    [date]="selectedDate()"
    [slot]="selectedSlot()"
    [existingDeclaration]="selectedExisting()"
    (saved)="onPanelSaved()"
    (deleted)="onPanelDeleted()"
    (cancelled)="closePanel()"
    (formChanged)="onFormChanged($event)"
  />
}
