<div
  class="character-avatar"
  [style.width.px]="size()"
  [style.height.px]="size()"
  [style.fontSize.px]="fontSize()"
  [attr.aria-label]="ariaLabel()"
  role="img"
>
  @if (absolutePortraitUrl(); as url) {
    <img class="character-avatar__img" [src]="url" [style.transform]="transform()" alt="" />
  } @else {
    {{ initials() }}
  }
</div>
