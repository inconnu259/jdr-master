<div class="calendar-month">
  <div class="month-nav">
    <button mat-icon-button (click)="prevMonth()" aria-label="Mois précédent">
      <mat-icon>chevron_left</mat-icon>
    </button>
    <h2 class="month-title">{{ monthLabel() }}</h2>
    <button mat-icon-button (click)="nextMonth()" aria-label="Mois suivant">
      <mat-icon>chevron_right</mat-icon>
    </button>
    <button mat-icon-button (click)="goToToday()" aria-label="Revenir au mois actuel" class="today-btn"
            [style.visibility]="isCurrentMonth() ? 'hidden' : 'visible'">
      <mat-icon>today</mat-icon>
    </button>
  </div>

  <div class="day-names" aria-hidden="true">
    @for (name of DAY_NAMES; track name) {
      <div class="day-name">{{ name }}</div>
    }
  </div>

  @if (loading()) {
    <div class="loading-overlay">
      <mat-spinner diameter="40" />
    </div>
  } @else {
    <div class="calendar-grid">
      @for (week of weeks(); track $index) {
        @for (cell of week; track cell.date.getTime()) {
          <div
            class="day-cell"
            [class.other-month]="!cell.isCurrentMonth"
            [class.today]="cell.isToday"
            [class.past]="cell.isPast"
            [attr.aria-label]="cell.date.getDate() + (cell.isToday ? ' (aujourd\'hui)' : '')"
            [attr.aria-disabled]="cell.isPast ? 'true' : null"
            [attr.role]="cell.isPast ? 'presentation' : 'button'"
            [attr.tabindex]="cell.isPast ? null : 0"
            (click)="onCellClick(cell.date, 'FULL_DAY')"
            (keyup.enter)="onCellClick(cell.date, 'FULL_DAY')"
            (keyup.space)="onCellClick(cell.date, 'FULL_DAY')"
          >
            <span class="day-number" aria-hidden="true">{{ cell.date.getDate() }}</span>
            <div class="segments">
              <span
                class="segment"
                [attr.data-status]="cell.morningPreview !== null ? cell.morningPreview : cell.morning"
                [class.preview]="cell.morningPreview !== null"
                [attr.aria-label]="slotAriaLabel('Matin', cell.morningPreview !== null ? cell.morningPreview : cell.morning)"
                role="img"
                (click)="$event.stopPropagation(); onCellClick(cell.date, 'MORNING')"
              ></span>
              <span
                class="segment"
                [attr.data-status]="cell.afternoonPreview !== null ? cell.afternoonPreview : cell.afternoon"
                [class.preview]="cell.afternoonPreview !== null"
                [attr.aria-label]="slotAriaLabel('Après-midi', cell.afternoonPreview !== null ? cell.afternoonPreview : cell.afternoon)"
                role="img"
                (click)="$event.stopPropagation(); onCellClick(cell.date, 'AFTERNOON')"
              ></span>
              <span
                class="segment"
                [attr.data-status]="cell.eveningPreview !== null ? cell.eveningPreview : cell.evening"
                [class.preview]="cell.eveningPreview !== null"
                [attr.aria-label]="slotAriaLabel('Soirée', cell.eveningPreview !== null ? cell.eveningPreview : cell.evening)"
                role="img"
                (click)="$event.stopPropagation(); onCellClick(cell.date, 'EVENING')"
              ></span>
            </div>
          </div>
        }
      }
    </div>
  }
</div>
