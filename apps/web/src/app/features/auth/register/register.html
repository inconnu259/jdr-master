<div class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header><mat-card-title>Créer un compte</mat-card-title></mat-card-header>
    <mat-card-content>
      @if (!token) {
        <p class="error">
          L'inscription se fait uniquement sur invitation. Ouvre un lien d'invitation pour créer ton compte.
        </p>
      }
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Pseudo</mat-label>
          <input matInput formControlName="pseudo" autocomplete="username" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Mot de passe (8+ caractères)</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="new-password" />
        </mat-form-field>
        @if (error()) {
          <p class="error">{{ error() }}</p>
        }
        <button mat-flat-button type="submit" [disabled]="loading() || !token">Créer le compte</button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <a routerLink="/login">J'ai déjà un compte</a>
    </mat-card-actions>
  </mat-card>
</div>
